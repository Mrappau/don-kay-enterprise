<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>🛒 DONKAY ENTERPRISE</h1>
      <p class="subtitle">Sign in to your account</p>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position:relative">
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
            <button type="button" onclick="togglePassword('loginPassword', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
      </form>
      <p class="auth-footer">Don't have an account? <a href="signup.html">Sign Up</a></p>
     </div>
  </div>
  <script src="data.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const users = DB.getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      if (!user) { alert('Invalid email or password'); return; }
      if (user.status === 'Inactive') { alert('Your account has been deactivated. Contact admin.'); return; }
      sessionStorage.setItem('pos_current_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }
    // Redirect if already logged in
    if (sessionStorage.getItem('pos_current_user')) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
