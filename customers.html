<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    const user = checkAuth();
    if (user) renderCustomers();

    function renderCustomers() {
      const customers = DB.getCustomers();
      const content = `
        <div class="card">
          <div class="card-header">
            <h3>Customers (${customers.length})</h3>
            <button class="btn btn-primary btn-sm" onclick="openAddCustomer()">+ Add Customer</button>
          </div>
          <div class="table-container">
            <table>
              <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Loyalty Points</th><th>Total Purchases</th><th>Actions</th></tr></thead>
              <tbody>
                ${customers.map(c => `
                  <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.phone}</td>
                    <td>${c.email||'-'}</td>
                    <td><span class="badge badge-info">⭐ ${c.loyaltyPoints}</span></td>
                    <td><strong>${formatCurrency(c.totalPurchases)}</strong></td>
                    <td>
                      <button class="btn btn-outline btn-sm" onclick="editCustomer(${c.id})">✏️</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">🗑️</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="modal-overlay" id="customerModal">
          <div class="modal">
            <div class="modal-header"><h3 id="custModalTitle">Add Customer</h3><button class="modal-close" onclick="closeModal('customerModal')">&times;</button></div>
            <div class="modal-body">
              <input type="hidden" id="editCustId">
              <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="custName" required></div>
              <div class="form-row">
                <div class="form-group"><label>Phone</label><input type="tel" class="form-control" id="custPhone"></div>
                <div class="form-group"><label>Email</label><input type="email" class="form-control" id="custEmail"></div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeModal('customerModal')">Cancel</button>
              <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
            </div>
          </div>
        </div>
      `;
      renderPageShell('customers', 'Customers', content);
    }

    function openAddCustomer() {
      document.getElementById('custModalTitle').textContent = 'Add Customer';
      document.getElementById('editCustId').value = '';
      document.getElementById('custName').value = '';
      document.getElementById('custPhone').value = '';
      document.getElementById('custEmail').value = '';
      openModal('customerModal');
    }

    function editCustomer(id) {
      const c = DB.getCustomers().find(x => x.id === id);
      document.getElementById('custModalTitle').textContent = 'Edit Customer';
      document.getElementById('editCustId').value = c.id;
      document.getElementById('custName').value = c.name;
      document.getElementById('custPhone').value = c.phone;
      document.getElementById('custEmail').value = c.email || '';
      openModal('customerModal');
    }

    function saveCustomer() {
      const id = document.getElementById('editCustId').value;
      const data = { name: document.getElementById('custName').value.trim(), phone: document.getElementById('custPhone').value.trim(), email: document.getElementById('custEmail').value.trim() };
      if (!data.name) { showToast('Name is required', 'error'); return; }
      if (id) { DB.updateCustomer(Number(id), data); showToast('Customer updated!'); }
      else { DB.addCustomer(data); showToast('Customer added!'); }
      closeModal('customerModal');
      renderCustomers();
    }

    function deleteCustomer(id) {
      if (confirm('Delete this customer?')) { DB.deleteCustomer(id); showToast('Customer deleted!'); renderCustomers(); }
    }
  </script>
</body>
</html>
