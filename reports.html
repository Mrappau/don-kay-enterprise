<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - POS System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .report-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .report-tab{padding:10px 20px;border:2px solid var(--border,#ddd);border-radius:8px;background:var(--card-bg,#fff);cursor:pointer;font-weight:600;font-size:14px;transition:all .2s}
    .report-tab:hover{border-color:var(--primary,#4f46e5);color:var(--primary,#4f46e5)}
    .report-tab.active{background:var(--primary,#4f46e5);color:#fff;border-color:var(--primary,#4f46e5)}
    .report-section{display:none}
    .report-section.active{display:block}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .kpi-card{background:var(--card-bg,#fff);border:1px solid var(--border,#e5e7eb);border-radius:12px;padding:20px;text-align:center}
    .kpi-value{font-size:28px;font-weight:800;color:var(--text,#111)}
    .kpi-label{font-size:13px;color:var(--text-muted,#6b7280);margin-top:4px}
    .chart-bar-wrap{margin-bottom:12px}
    .chart-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
    .chart-bar-track{height:10px;background:var(--border,#e5e7eb);border-radius:6px;overflow:hidden}
    .chart-bar-fill{height:100%;border-radius:6px;transition:width .5s}
    .stock-badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
    .stock-in{background:#d1fae5;color:#065f46}
    .stock-low{background:#fef3c7;color:#92400e}
    .stock-out{background:#fee2e2;color:#991b1b}
    .export-btn{padding:8px 16px;background:var(--primary,#4f46e5);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
    .export-btn:hover{opacity:.85}
  </style>
</head>
<body>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    const user = checkAuth();
    if (user) renderReports();

    function switchTab(tabId) {
      document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.report-section').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function exportTableCSV(tableId, filename) {
      const table = document.getElementById(tableId);
      if (!table) return;
      let csv = [];
      table.querySelectorAll('tr').forEach(row => {
        const cols = [];
        row.querySelectorAll('th, td').forEach(cell => cols.push('"' + cell.textContent.trim().replace(/"/g,'""') + '"'));
        csv.push(cols.join(','));
      });
      const blob = new Blob([csv.join('\n')], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    function renderReports() {
      const sales = DB.getSales();
      const products = DB.getProducts();
      const now = new Date();

      // ── Helpers ──
      const fmt = (n) => formatCurrency(n);
      const dayKey = (d) => new Date(d).toLocaleDateString();
      const getStock = (p) => Number(p.stock ?? p.quantity ?? 0);
      const getPrice = (p) => Number(p.price ?? 0);
      const getCost  = (p) => Number(p.cost ?? p.costPrice ?? p.buyingPrice ?? 0);

      // ── Daily Sales (last 7 days) ──
      const dailyData = {};
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = d.toLocaleDateString();
        const daySales = sales.filter(s => dayKey(s.date) === key);
        dailyData[key] = { revenue: daySales.reduce((s,x) => s + (x.total||0), 0), count: daySales.length, tax: daySales.reduce((s,x) => s + (x.tax||0), 0) };
      }
      const dailyTotalRev = Object.values(dailyData).reduce((s,d) => s + d.revenue, 0);
      const dailyTotalTx  = Object.values(dailyData).reduce((s,d) => s + d.count, 0);
      const dailyMaxRev   = Math.max(...Object.values(dailyData).map(d => d.revenue), 1);

      // ── Weekly Sales (last 4 weeks) ──
      const weeklyData = [];
      for (let w = 3; w >= 0; w--) {
        const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() - w * 7);
        const weekStart = new Date(weekEnd); weekStart.setDate(weekStart.getDate() - 6);
        const weekSales = sales.filter(s => { const d = new Date(s.date); return d >= weekStart && d <= weekEnd; });
        weeklyData.push({
          label: `${weekStart.toLocaleDateString()} - ${weekEnd.toLocaleDateString()}`,
          revenue: weekSales.reduce((s,x) => s + (x.total||0), 0),
          count: weekSales.length,
          tax: weekSales.reduce((s,x) => s + (x.tax||0), 0)
        });
      }
      const weeklyMaxRev = Math.max(...weeklyData.map(w => w.revenue), 1);

      // ── Product Performance ──
      const prodMap = {};
      sales.forEach(s => (s.items||[]).forEach(i => {
        const key = i.name || i.product || 'Unknown';
        if (!prodMap[key]) prodMap[key] = { name: key, qty: 0, revenue: 0 };
        prodMap[key].qty += (i.quantity || 1);
        prodMap[key].revenue += (i.price || 0) * (i.quantity || 1);
      }));
      const prodList = Object.values(prodMap).sort((a,b) => b.revenue - a.revenue);
      const prodTotalRev = prodList.reduce((s,p) => s + p.revenue, 0);

      // ── Inventory ──
      const totalProducts = products.length;
      const inStock  = products.filter(p => getStock(p) > 5).length;
      const lowStock = products.filter(p => getStock(p) > 0 && getStock(p) <= 5).length;
      const outStock = products.filter(p => getStock(p) <= 0).length;
      const totalStockValue = products.reduce((s,p) => s + getStock(p) * getPrice(p), 0);

      // ── Cashier Sales ──
      const cashierMap = {};
      sales.forEach(s => {
        const name = s.cashier || s.user || s.attendant || 'Unknown';
        if (!cashierMap[name]) cashierMap[name] = { name, sales: 0, revenue: 0, items: 0 };
        cashierMap[name].sales++;
        cashierMap[name].revenue += (s.total || 0);
        cashierMap[name].items += (s.items||[]).reduce((sum,i) => sum + (i.quantity||1), 0);
      });
      const cashierList = Object.values(cashierMap).sort((a,b) => b.revenue - a.revenue);

      // ── BUILD HTML ──
      const content = `
        <div class="report-tabs">
          <button class="report-tab active" data-tab="tab-daily" onclick="switchTab('tab-daily')">📅 Daily Sales</button>
          <button class="report-tab" data-tab="tab-weekly" onclick="switchTab('tab-weekly')">📆 Weekly Sales</button>
          <button class="report-tab" data-tab="tab-products" onclick="switchTab('tab-products')">📦 Product Performance</button>
          <button class="report-tab" data-tab="tab-inventory" onclick="switchTab('tab-inventory')">🏪 Inventory</button>
          <button class="report-tab" data-tab="tab-cashier" onclick="switchTab('tab-cashier')">👤 Cashier Sales</button>
        </div>

        <!-- ===== DAILY SALES ===== -->
        <div id="tab-daily" class="report-section active">
          <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${fmt(dailyTotalRev)}</div><div class="kpi-label">7-Day Revenue</div></div>
            <div class="kpi-card"><div class="kpi-value">${dailyTotalTx}</div><div class="kpi-label">Transactions</div></div>
            <div class="kpi-card"><div class="kpi-value">${fmt(dailyTotalTx ? dailyTotalRev/dailyTotalTx : 0)}</div><div class="kpi-label">Avg per Transaction</div></div>
          </div>
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
              <h3>Daily Revenue (Last 7 Days)</h3>
              <button class="export-btn" onclick="exportTableCSV('daily-table','daily_sales.csv')">⬇ Export CSV</button>
            </div>
            <div class="card-body">
              ${Object.entries(dailyData).map(([date, d]) => `
                <div class="chart-bar-wrap">
                  <div class="chart-bar-label"><span>${date}</span><strong>${fmt(d.revenue)} (${d.count} sales)</strong></div>
                  <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(d.revenue/dailyMaxRev)*100}%;background:var(--primary,#4f46e5)"></div></div>
                </div>`).join('')}
            </div>
            <div class="table-container">
              <table id="daily-table">
                <thead><tr><th>Date</th><th>Revenue</th><th>Transactions</th><th>Tax</th></tr></thead>
                <tbody>${Object.entries(dailyData).map(([date,d]) => `<tr><td>${date}</td><td>${fmt(d.revenue)}</td><td>${d.count}</td><td>${fmt(d.tax)}</td></tr>`).join('')}</tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===== WEEKLY SALES ===== -->
        <div id="tab-weekly" class="report-section">
          <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${fmt(weeklyData.reduce((s,w)=>s+w.revenue,0))}</div><div class="kpi-label">4-Week Revenue</div></div>
            <div class="kpi-card"><div class="kpi-value">${weeklyData.reduce((s,w)=>s+w.count,0)}</div><div class="kpi-label">Total Transactions</div></div>
          </div>
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
              <h3>Weekly Revenue (Last 4 Weeks)</h3>
              <button class="export-btn" onclick="exportTableCSV('weekly-table','weekly_sales.csv')">⬇ Export CSV</button>
            </div>
            <div class="card-body">
              ${weeklyData.map((w,i) => `
                <div class="chart-bar-wrap">
                  <div class="chart-bar-label"><span>Week ${4-i}: ${w.label}</span><strong>${fmt(w.revenue)}</strong></div>
                  <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${(w.revenue/weeklyMaxRev)*100}%;background:#10b981"></div></div>
                </div>`).join('')}
            </div>
            <div class="table-container">
              <table id="weekly-table">
                <thead><tr><th>Week</th><th>Revenue</th><th>Transactions</th><th>Tax</th></tr></thead>
                <tbody>${weeklyData.map((w,i) => `<tr><td>Week ${4-i}: ${w.label}</td><td>${fmt(w.revenue)}</td><td>${w.count}</td><td>${fmt(w.tax)}</td></tr>`).join('')}</tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===== PRODUCT PERFORMANCE ===== -->
        <div id="tab-products" class="report-section">
          <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${prodList.length}</div><div class="kpi-label">Products Sold</div></div>
            <div class="kpi-card"><div class="kpi-value">${fmt(prodTotalRev)}</div><div class="kpi-label">Total Product Revenue</div></div>
            <div class="kpi-card"><div class="kpi-value">${prodList.reduce((s,p)=>s+p.qty,0)}</div><div class="kpi-label">Total Units Sold</div></div>
          </div>
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
              <h3>Product Performance</h3>
              <button class="export-btn" onclick="exportTableCSV('product-table','product_performance.csv')">⬇ Export CSV</button>
            </div>
            <div class="table-container">
              <table id="product-table">
                <thead><tr><th>#</th><th>Product</th><th>Qty Sold</th><th>Revenue</th><th>Share %</th></tr></thead>
                <tbody>${prodList.length ? prodList.map((p,i) => `
                  <tr>
                    <td>${i+1}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.qty}</td>
                    <td>${fmt(p.revenue)}</td>
                    <td>${prodTotalRev ? ((p.revenue/prodTotalRev)*100).toFixed(1) : 0}%</td>
                  </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted,#999)">No sales data yet</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===== INVENTORY ===== -->
        <div id="tab-inventory" class="report-section">
          <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${totalProducts}</div><div class="kpi-label">Total Products</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:#065f46">${inStock}</div><div class="kpi-label">In Stock</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:#92400e">${lowStock}</div><div class="kpi-label">Low Stock (≤5)</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:#991b1b">${outStock}</div><div class="kpi-label">Out of Stock</div></div>
            <div class="kpi-card"><div class="kpi-value">${fmt(totalStockValue)}</div><div class="kpi-label">Total Stock Value</div></div>
          </div>
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
              <h3>Inventory Details</h3>
              <button class="export-btn" onclick="exportTableCSV('inventory-table','inventory_report.csv')">⬇ Export CSV</button>
            </div>
            <div class="table-container">
              <table id="inventory-table">
                <thead><tr><th>#</th><th>Product</th><th>Category</th><th>Price</th><th>Cost</th><th>Stock</th><th>Stock Value</th><th>Status</th></tr></thead>
                <tbody>${products.length ? products.map((p,i) => {
                  const stock = getStock(p);
                  const status = stock <= 0 ? '<span class="stock-badge stock-out">Out of Stock</span>' : stock <= 5 ? '<span class="stock-badge stock-low">Low Stock</span>' : '<span class="stock-badge stock-in">In Stock</span>';
                  return `<tr>
                    <td>${i+1}</td>
                    <td><strong>${p.name || 'N/A'}</strong></td>
                    <td>${p.category || 'N/A'}</td>
                    <td>${fmt(getPrice(p))}</td>
                    <td>${fmt(getCost(p))}</td>
                    <td><strong>${stock}</strong></td>
                    <td>${fmt(stock * getPrice(p))}</td>
                    <td>${status}</td>
                  </tr>`;
                }).join('') : '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted,#999)">No products found</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===== CASHIER SALES ===== -->
        <div id="tab-cashier" class="report-section">
          <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${cashierList.length}</div><div class="kpi-label">Active Cashiers</div></div>
            <div class="kpi-card"><div class="kpi-value">${fmt(cashierList.reduce((s,c)=>s+c.revenue,0))}</div><div class="kpi-label">Total Revenue</div></div>
          </div>
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
              <h3>Cashier Performance</h3>
              <button class="export-btn" onclick="exportTableCSV('cashier-table','cashier_sales.csv')">⬇ Export CSV</button>
            </div>
            <div class="table-container">
              <table id="cashier-table">
                <thead><tr><th>#</th><th>Cashier</th><th>Sales</th><th>Items Sold</th><th>Revenue</th><th>Avg/Sale</th></tr></thead>
                <tbody>${cashierList.length ? cashierList.map((c,i) => `
                  <tr>
                    <td>${i+1}</td>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.sales}</td>
                    <td>${c.items}</td>
                    <td>${fmt(c.revenue)}</td>
                    <td>${fmt(c.sales ? c.revenue/c.sales : 0)}</td>
                  </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted,#999)">No cashier data yet</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
      renderPageShell('reports', 'Reports & Analytics', content);
    }
  </script>
</body>
</html>
